services:
  opensearch-node:
    image: opensearchproject/opensearch:2.11.1
    container_name: opensearch-node
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=${DISABLE_SECURITY_PLUGIN:-true}
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT:-9200}
    ports:
      - "${OPENSEARCH_PORT}:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$$OPENSEARCH_PORT/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi-backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-opensearch-node}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT:-9200}
      - ENV=${ENV:-development}
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
    depends_on:
      opensearch-node:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - app-network
    command: sh -c "uvicorn app.main:app --host $$BACKEND_HOST --port $$BACKEND_PORT --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: react-frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - FRONTEND_PORT=${FRONTEND_PORT:-5173}
      - VITE_PORT=${FRONTEND_PORT:-5173}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network
    command: sh -c "npm run dev -- --host 0.0.0.0 --port $$FRONTEND_PORT"

volumes:
  opensearch-data:

networks:
  app-network:
    driver: bridge
